<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300" role="img" aria-label="GapHarness print-friendly pipeline">
  <rect width="980" height="300" fill="#ffffff"/>
  <style>
    .box { fill: #eef2ff; stroke: #334155; stroke-width: 1.5; }
    .text { font-family: Arial, sans-serif; font-size: 13px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .line { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    .note { font-family: Arial, sans-serif; font-size: 12px; fill: #4b5563; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="490" y="30" class="note">Obligation-first harness synthesis separates profiling, registry coverage, execution, tracing, and verification.</text>

  <rect x="30" y="70" width="145" height="50" rx="5" class="box"/>
  <text x="102.5" y="95" class="text">User Query</text>
  <rect x="220" y="70" width="145" height="50" rx="5" class="box"/>
  <text x="292.5" y="95" class="text">Obligation Profiler</text>
  <rect x="410" y="70" width="145" height="50" rx="5" class="box"/>
  <text x="482.5" y="95" class="text">Obligation Profile</text>
  <rect x="600" y="70" width="145" height="50" rx="5" class="box"/>
  <text x="672.5" y="95" class="text">Module Registry</text>
  <rect x="790" y="70" width="145" height="50" rx="5" class="box"/>
  <text x="862.5" y="95" class="text">Exact Compiler</text>

  <path d="M 175 95 L 220 95" class="line"/>
  <path d="M 365 95 L 410 95" class="line"/>
  <path d="M 555 95 L 600 95" class="line"/>
  <path d="M 745 95 L 790 95" class="line"/>

  <rect x="125" y="190" width="145" height="50" rx="5" class="box"/>
  <text x="197.5" y="215" class="text">Sandbox Executor</text>
  <rect x="315" y="190" width="145" height="50" rx="5" class="box"/>
  <text x="387.5" y="215" class="text">Trace Recorder</text>
  <rect x="505" y="190" width="145" height="50" rx="5" class="box"/>
  <text x="577.5" y="215" class="text">Verifiers</text>
  <rect x="695" y="190" width="145" height="50" rx="5" class="box"/>
  <text x="767.5" y="215" class="text">Experiment Report</text>

  <path d="M 862.5 120 C 862.5 155, 197.5 155, 197.5 190" class="line"/>
  <path d="M 270 215 L 315 215" class="line"/>
  <path d="M 460 215 L 505 215" class="line"/>
  <path d="M 650 215 L 695 215" class="line"/>

  <text x="490" y="278" class="note">If no declared registry subset covers the profile, GapHarness returns unsupported or clarify instead of fabricating support.</text>
</svg>
