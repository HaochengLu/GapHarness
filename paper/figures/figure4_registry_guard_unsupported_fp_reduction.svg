<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="Registry guard unsupported false positive reduction">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="52" y="54" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Registry guard reduces unsupported false positives</text>
  <text x="52" y="84" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Held-out GapBench test800, Phase 2B selected LLM vs Phase 2C registry-guarded profiler</text>

  <line x1="110" y1="420" x2="790" y2="420" stroke="#111827" stroke-width="1.5"/>
  <line x1="110" y1="120" x2="110" y2="420" stroke="#111827" stroke-width="1.5"/>

  <text x="62" y="424" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">0</text>
  <text x="52" y="317" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">20</text>
  <text x="52" y="210" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">40</text>
  <text x="52" y="130" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">56</text>
  <line x1="104" y1="313" x2="790" y2="313" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="104" y1="206" x2="790" y2="206" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="104" y1="120" x2="790" y2="120" stroke="#e5e7eb" stroke-width="1"/>

  <rect x="220" y="120" width="150" height="300" rx="6" fill="#7c3aed"/>
  <rect x="530" y="356" width="150" height="64" rx="6" fill="#059669"/>

  <text x="276" y="110" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">56</text>
  <text x="584" y="346" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">12</text>

  <text x="198" y="455" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Phase 2B</text>
  <text x="176" y="477" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">selected llm_single</text>
  <text x="500" y="455" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Phase 2C</text>
  <text x="476" y="477" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">registry_guarded</text>

  <path d="M392 253 C444 221, 474 221, 510 253" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="409" y="205" font-family="Arial, sans-serif" font-size="14" fill="#111827">-44 false unsupported cases</text>
  <text x="409" y="227" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">sandbox/mock actions restored to supported</text>

  <rect x="120" y="92" width="170" height="26" rx="4" fill="#f5f3ff"/>
  <text x="132" y="110" font-family="Arial, sans-serif" font-size="13" fill="#5b21b6">success: 0.89 -> 0.94</text>
  <rect x="310" y="92" width="154" height="26" rx="4" fill="#ecfdf5"/>
  <text x="322" y="110" font-family="Arial, sans-serif" font-size="13" fill="#047857">under: 0.09 -> 0.03</text>
  <rect x="484" y="92" width="150" height="26" rx="4" fill="#fff7ed"/>
  <text x="496" y="110" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">regret: -0.09 -> 0.30</text>

  <text x="52" y="500" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Unsupported false positives count supported tasks compiled as unsupported. This calibration favors sufficiency and slightly raises cost/regret.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>
</svg>
